<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>こども服薬・パニック記録</title>
  <style>
    :root {
      --bg: #eaf8ff;
      --bg2: #f7fdff;
      --card: rgba(255, 255, 255, 0.94);
      --text: #28506b;
      --muted: #6f8fa3;
      --line: #c9edf9;
      --main: #55bfe8;
      --main-dark: #2399c8;
      --accent: #ff9fc8;
      --accent-soft: #fff0f7;
      --danger: #e85d75;
      --ok: #49b88a;
      --soft: #e4f7ff;
      --shadow: 0 10px 28px rgba(61, 169, 214, 0.16);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 8%, rgba(255,255,255,.9) 0 8px, transparent 9px),
        radial-gradient(circle at 82% 12%, rgba(255,159,200,.28) 0 18px, transparent 19px),
        radial-gradient(circle at 20% 88%, rgba(85,191,232,.24) 0 28px, transparent 29px),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(234, 248, 255, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(201, 237, 249, .85);
    }

    .header-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    h1 {
      font-size: 1.18rem;
      margin: 0;
      line-height: 1.3;
      color: #247da6;
      letter-spacing: .02em;
    }

    h1::before {
      content: "🫧 ";
    }

    .sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px 90px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .header-inner { align-items: flex-start; flex-direction: column; }
    }

    .card {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid rgba(201, 237, 249, 0.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 17px;
      margin-bottom: 16px;
    }

    .card::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(85, 191, 232, 0.09);
      pointer-events: none;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: #267fa7;
      border-left: 0;
      padding-left: 0;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(90deg, #e2f7ff, #fff);
      border-radius: 999px;
      padding: 6px 12px;
    }

    .card h2::before {
      content: "☁️";
      font-size: .95rem;
    }

    label {
      display: block;
      font-weight: 800;
      font-size: 0.92rem;
      margin: 14px 0 6px;
      color: #315f78;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #b9e5f5;
      border-radius: 16px;
      padding: 11px 12px;
      font: inherit;
      background: #ffffff;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 4px rgba(85, 191, 232, 0.18);
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
    }

    .scale-wrap {
      background: #f3fbff;
      border: 1px solid #c9edf9;
      border-radius: 18px;
      padding: 12px;
      margin-top: 6px;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--main);
    }

    .scale-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .score {
      font-weight: 900;
      color: var(--main-dark);
      font-size: 1.18rem;
      background: #fff;
      border: 1px solid #c9edf9;
      min-width: 38px;
      text-align: center;
      border-radius: 999px;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .seg label {
      margin: 0;
      font-weight: 700;
      cursor: pointer;
    }

    .seg input {
      display: none;
    }

    .seg span {
      display: block;
      text-align: center;
      padding: 10px 8px;
      border: 1px solid #b9e5f5;
      border-radius: 999px;
      background: #fff;
      color: #3f6b83;
    }

    .seg input:checked + span {
      background: linear-gradient(180deg, #dff6ff, #ffffff);
      border-color: var(--main);
      color: #167da7;
      font-weight: 900;
      box-shadow: 0 5px 14px rgba(85,191,232,.18);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 900;
      cursor: pointer;
      background: linear-gradient(180deg, #65c9ed, #35a9d6);
      color: #fff;
      font-size: 0.92rem;
      box-shadow: 0 8px 18px rgba(53,169,214,.22);
    }

    button:hover { filter: brightness(.98); transform: translateY(-1px); }
    button.secondary { background: linear-gradient(180deg, #fff0f7, #ffd8e9); color: #b73572; box-shadow: 0 8px 18px rgba(255,159,200,.22); }
    button.gray { background: #edf9fe; color: #287da4; box-shadow: none; border: 1px solid #c9edf9; }
    button.danger { background: #fff0f3; color: var(--danger); box-shadow: none; border: 1px solid #ffd0da; }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    @media (max-width: 520px) {
      .summary { grid-template-columns: 1fr; }
    }

    .stat {
      background: linear-gradient(180deg, #f4fbff, #ffffff);
      border: 1px solid #c9edf9;
      border-radius: 18px;
      padding: 12px;
    }

    .stat .num {
      font-size: 1.35rem;
      font-weight: 950;
      color: #2399c8;
    }

    .stat .cap {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log {
      border: 1px solid #c9edf9;
      border-radius: 18px;
      padding: 12px;
      background: #fff;
    }

    .log-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .log-title {
      font-weight: 950;
      color: #286b8b;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      background: #eef9ff;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.78rem;
      color: #36657d;
      border: 1px solid #d7f1fb;
    }

    .tag.red { background: #fff0f3; color: #b4234a; border-color: #ffd0da; }
    .tag.green { background: #e9fff5; color: #087a54; border-color: #c9f4df; }
    .tag.blue { background: #eaf8ff; color: #167da7; border-color: #c9edf9; }

    .small {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .notice {
      background: #ffffff;
      border: 1px solid #b9e5f5;
      color: #3a738f;
      border-radius: 20px;
      padding: 12px 14px;
      font-size: 0.88rem;
      box-shadow: var(--shadow);
    }

    .notice::before {
      content: "💧 ";
    }

    .file-input {
      background: #fff;
      border: 1px dashed #b9e5f5;
      padding: 12px;
      border-radius: 18px;
    }

    .hidden { display: none; }

    .pill {
      display: inline-block;
      background: var(--accent-soft);
      color: #b73572;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.76rem;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>こころとからだの記録</h1>
        <div class="sub">水色ベースのやさしい記録アプリ・JSON共有対応</div>
      </div>
      <div class="buttons" style="margin:0;">
        <button class="secondary" onclick="exportJSON()">JSON書き出し</button>
        <button class="gray" onclick="document.getElementById('importFile').click()">JSON読み込み</button>
      </div>
    </div>
  </header>

  <main>
    <div class="notice">
      このアプリは家庭内の記録用です。薬の増減・中止・飲み方の変更は、必ず処方医または薬剤師に確認してください。
    </div>

    <input id="importFile" class="hidden" type="file" accept="application/json,.json" onchange="importJSON(event)" />

    <div class="grid" style="margin-top:16px;">
      <section>
        <div class="card">
          <h2>今日の記録</h2>

          <div class="row">
            <div>
              <label for="date">日付</label>
              <input id="date" type="date" />
            </div>
            <div>
              <label for="recorder">記録者</label>
              <select id="recorder">
                <option value="">選択なし</option>
                <option value="父">父</option>
                <option value="母">母</option>
                <option value="その他">その他</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label for="medicineTime">何時に飲んだか</label>
              <input id="medicineTime" type="time" />
            </div>
            <div>
              <label for="sleepTime">何時に寝たか</label>
              <input id="sleepTime" type="time" />
            </div>
          </div>

          <label>夜のパニックの強さ：0〜10</label>
          <div class="scale-wrap">
            <div class="scale-head"><span>0=なし</span><span class="score" id="nightScoreLabel">0</span><span>10=最大</span></div>
            <input id="nightPanic" type="range" min="0" max="10" value="0" oninput="nightScoreLabel.textContent=this.value" />
          </div>

          <label>朝のパニックの強さ：0〜10</label>
          <div class="scale-wrap">
            <div class="scale-head"><span>0=なし</span><span class="score" id="morningScoreLabel">0</span><span>10=最大</span></div>
            <input id="morningPanic" type="range" min="0" max="10" value="0" oninput="morningScoreLabel.textContent=this.value" />
          </div>

          <label>腹痛・吐き気</label>
          <div class="seg">
            <label><input type="radio" name="stomach" value="なし" checked><span>なし</span></label>
            <label><input type="radio" name="stomach" value="腹痛"><span>腹痛</span></label>
            <label><input type="radio" name="stomach" value="吐き気"><span>吐き気</span></label>
          </div>

          <label>眠気・ふらつき</label>
          <div class="seg">
            <label><input type="radio" name="sleepy" value="なし" checked><span>なし</span></label>
            <label><input type="radio" name="sleepy" value="眠気"><span>眠気</span></label>
            <label><input type="radio" name="sleepy" value="ふらつき"><span>ふらつき</span></label>
          </div>

          <label>崩れ方は軽くなったか</label>
          <div class="seg">
            <label><input type="radio" name="meltdownChange" value="軽くなった"><span>軽くなった</span></label>
            <label><input type="radio" name="meltdownChange" value="変わらない" checked><span>変わらない</span></label>
            <label><input type="radio" name="meltdownChange" value="悪化"><span>悪化</span></label>
          </div>

          <label>妹への攻撃性</label>
          <div class="seg">
            <label><input type="radio" name="sisterAggression" value="減った"><span>減った</span></label>
            <label><input type="radio" name="sisterAggression" value="変わらない" checked><span>変わらない</span></label>
            <label><input type="radio" name="sisterAggression" value="増えた"><span>増えた</span></label>
          </div>

          <label for="unusual">いつもと違う様子</label>
          <textarea id="unusual" placeholder="例：いつもより眠そう／逆に興奮していた／食欲がない／朝まで薬が残っている感じ など"></textarea>

          <label for="memo">メモ</label>
          <textarea id="memo" placeholder="登校できたかではなく、パニックの時間・強さ・回復までの時間・帰宅後の崩れ方など"></textarea>

          <div class="buttons">
            <button onclick="saveRecord()">保存</button>
            <button class="gray" onclick="clearForm()">入力リセット</button>
          </div>
        </div>
      </section>

      <aside>
        <div class="card">
          <h2>直近7件の概要</h2>
          <div class="summary">
            <div class="stat">
              <div class="num" id="countStat">0</div>
              <div class="cap">記録数</div>
            </div>
            <div class="stat">
              <div class="num" id="nightAvg">-</div>
              <div class="cap">夜平均</div>
            </div>
            <div class="stat">
              <div class="num" id="morningAvg">-</div>
              <div class="cap">朝平均</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>共有方法</h2>
          <p class="small">
            夫婦どちらかが入力 →「JSON書き出し」→ LINEやメールで送る → もう一方が「JSON読み込み」。
            読み込み時は同じ日付の記録がある場合、後から読み込んだ内容で上書きされます。
          </p>
        </div>
      </aside>
    </div>

    <div class="card">
      <h2>記録一覧</h2>
      <div class="buttons" style="margin-top:0;margin-bottom:12px;">
        <button class="gray" onclick="copySummary()">医師に見せる要約をコピー</button>
        <button class="danger" onclick="deleteAll()">全削除</button>
      </div>
      <div id="logList" class="log-list"></div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "child_med_panic_records_v1";
    let records = [];

    function todayString() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function getRadio(name) {
      return document.querySelector(`input[name="${name}"]:checked`)?.value || "";
    }

    function setRadio(name, value) {
      const el = document.querySelector(`input[name="${name}"][value="${value}"]`);
      if (el) el.checked = true;
    }

    function loadRecords() {
      try {
        records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        records = [];
      }
      render();
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function saveRecord() {
      const date = document.getElementById("date").value || todayString();
      const record = {
        id: date,
        date,
        recorder: document.getElementById("recorder").value,
        medicineTime: document.getElementById("medicineTime").value,
        sleepTime: document.getElementById("sleepTime").value,
        nightPanic: Number(document.getElementById("nightPanic").value),
        morningPanic: Number(document.getElementById("morningPanic").value),
        stomach: getRadio("stomach"),
        sleepy: getRadio("sleepy"),
        meltdownChange: getRadio("meltdownChange"),
        sisterAggression: getRadio("sisterAggression"),
        unusual: document.getElementById("unusual").value.trim(),
        memo: document.getElementById("memo").value.trim(),
        updatedAt: new Date().toISOString()
      };

      const index = records.findIndex(r => r.date === date);
      if (index >= 0) {
        records[index] = record;
      } else {
        records.push(record);
      }

      records.sort((a, b) => b.date.localeCompare(a.date));
      saveRecords();
      render();
      alert("保存しました");
    }

    function editRecord(date) {
      const r = records.find(x => x.date === date);
      if (!r) return;

      document.getElementById("date").value = r.date;
      document.getElementById("recorder").value = r.recorder || "";
      document.getElementById("medicineTime").value = r.medicineTime || "";
      document.getElementById("sleepTime").value = r.sleepTime || "";
      document.getElementById("nightPanic").value = r.nightPanic ?? 0;
      document.getElementById("morningPanic").value = r.morningPanic ?? 0;
      document.getElementById("nightScoreLabel").textContent = r.nightPanic ?? 0;
      document.getElementById("morningScoreLabel").textContent = r.morningPanic ?? 0;
      setRadio("stomach", r.stomach || "なし");
      setRadio("sleepy", r.sleepy || "なし");
      setRadio("meltdownChange", r.meltdownChange || "変わらない");
      setRadio("sisterAggression", r.sisterAggression || "変わらない");
      document.getElementById("unusual").value = r.unusual || "";
      document.getElementById("memo").value = r.memo || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteRecord(date) {
      if (!confirm(`${date} の記録を削除しますか？`)) return;
      records = records.filter(r => r.date !== date);
      saveRecords();
      render();
    }

    function deleteAll() {
      if (!confirm("すべての記録を削除しますか？この操作は戻せません。")) return;
      records = [];
      saveRecords();
      render();
    }

    function clearForm() {
      document.getElementById("date").value = todayString();
      document.getElementById("recorder").value = "";
      document.getElementById("medicineTime").value = "";
      document.getElementById("sleepTime").value = "";
      document.getElementById("nightPanic").value = 0;
      document.getElementById("morningPanic").value = 0;
      document.getElementById("nightScoreLabel").textContent = 0;
      document.getElementById("morningScoreLabel").textContent = 0;
      setRadio("stomach", "なし");
      setRadio("sleepy", "なし");
      setRadio("meltdownChange", "変わらない");
      setRadio("sisterAggression", "変わらない");
      document.getElementById("unusual").value = "";
      document.getElementById("memo").value = "";
    }

    function tagClass(value) {
      if (["悪化", "増えた", "腹痛", "吐き気", "眠気", "ふらつき"].includes(value)) return "red";
      if (["軽くなった", "減った", "なし"].includes(value)) return "green";
      return "blue";
    }

    function render() {
      document.getElementById("countStat").textContent = records.length;

      const recent = [...records].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 7);
      if (recent.length) {
        const nAvg = recent.reduce((sum, r) => sum + Number(r.nightPanic || 0), 0) / recent.length;
        const mAvg = recent.reduce((sum, r) => sum + Number(r.morningPanic || 0), 0) / recent.length;
        document.getElementById("nightAvg").textContent = nAvg.toFixed(1);
        document.getElementById("morningAvg").textContent = mAvg.toFixed(1);
      } else {
        document.getElementById("nightAvg").textContent = "-";
        document.getElementById("morningAvg").textContent = "-";
      }

      const list = document.getElementById("logList");
      list.innerHTML = "";

      if (!records.length) {
        list.innerHTML = `<p class="small">まだ記録がありません。</p>`;
        return;
      }

      records.forEach(r => {
        const div = document.createElement("div");
        div.className = "log";
        div.innerHTML = `
          <div class="log-head">
            <div>
              <div class="log-title">${escapeHTML(r.date)} <span class="pill">${escapeHTML(r.recorder || "記録者なし")}</span></div>
              <div class="small">服薬 ${escapeHTML(r.medicineTime || "-")} ／ 就寝 ${escapeHTML(r.sleepTime || "-")}</div>
            </div>
            <div class="buttons" style="margin:0;">
              <button class="gray" onclick="editRecord('${r.date}')">編集</button>
              <button class="danger" onclick="deleteRecord('${r.date}')">削除</button>
            </div>
          </div>
          <div class="tags">
            <span class="tag red">夜 ${r.nightPanic}/10</span>
            <span class="tag red">朝 ${r.morningPanic}/10</span>
            <span class="tag ${tagClass(r.stomach)}">腹痛吐き気：${escapeHTML(r.stomach)}</span>
            <span class="tag ${tagClass(r.sleepy)}">眠気ふらつき：${escapeHTML(r.sleepy)}</span>
            <span class="tag ${tagClass(r.meltdownChange)}">崩れ方：${escapeHTML(r.meltdownChange)}</span>
            <span class="tag ${tagClass(r.sisterAggression)}">妹への攻撃性：${escapeHTML(r.sisterAggression)}</span>
          </div>
          ${r.unusual ? `<p><strong>いつもと違う様子：</strong>${escapeHTML(r.unusual)}</p>` : ""}
          ${r.memo ? `<p><strong>メモ：</strong>${escapeHTML(r.memo)}</p>` : ""}
        `;
        list.appendChild(div);
      });
    }

    function exportJSON() {
      const payload = {
        app: "child_med_panic_records",
        version: 1,
        exportedAt: new Date().toISOString(),
        records
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `こども服薬パニック記録_${todayString()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const imported = Array.isArray(data) ? data : data.records;
          if (!Array.isArray(imported)) throw new Error("records not found");

          const map = new Map(records.map(r => [r.date, r]));
          imported.forEach(r => {
            if (r && r.date) map.set(r.date, r);
          });
          records = Array.from(map.values()).sort((a,b) => b.date.localeCompare(a.date));
          saveRecords();
          render();
          alert("JSONを読み込みました。同じ日付の記録は上書きしました。");
        } catch (e) {
          alert("読み込みに失敗しました。JSON形式を確認してください。");
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    }

    function copySummary() {
      if (!records.length) {
        alert("記録がありません");
        return;
      }

      const lines = [];
      lines.push("【服薬・パニック記録 要約】");
      lines.push(`記録期間：${records[records.length - 1].date} 〜 ${records[0].date}`);
      lines.push(`記録数：${records.length}件`);
      lines.push("");

      records.slice(0, 14).forEach(r => {
        lines.push(`■ ${r.date}`);
        lines.push(`服薬：${r.medicineTime || "-"} ／ 就寝：${r.sleepTime || "-"}`);
        lines.push(`夜のパニック：${r.nightPanic}/10 ／ 朝のパニック：${r.morningPanic}/10`);
        lines.push(`腹痛・吐き気：${r.stomach} ／ 眠気・ふらつき：${r.sleepy}`);
        lines.push(`崩れ方：${r.meltdownChange} ／ 妹への攻撃性：${r.sisterAggression}`);
        if (r.unusual) lines.push(`いつもと違う様子：${r.unusual}`);
        if (r.memo) lines.push(`メモ：${r.memo}`);
        lines.push("");
      });

      navigator.clipboard.writeText(lines.join("\n")).then(() => {
        alert("医師に見せる要約をコピーしました");
      }).catch(() => {
        alert("コピーに失敗しました");
      });
    }

    function escapeHTML(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("date").value = todayString();
    loadRecords();
  </script>
</body>
</html>
